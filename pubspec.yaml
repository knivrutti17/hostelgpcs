name: gpcs_hostel_portal
description: Hostel Management System for GP Chhatrapati Sambhajinagar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.6

  # Media Handling
  image_picker: ^1.1.2

  # Location (Attendance GPS)
  geolocator: ^13.0.1

  # Session Management (Persistent Login)
  shared_preferences: ^2.3.5

  # UI
  marquee: ^2.2.3
  table_calendar: ^3.1.3
  intl: ^0.19.0

  # PDF + Receipt Generation
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2

  # QR Code
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  flutter_image_compress: ^2.3.0 # Required for size reduction

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/gpcslogo.png
    - assets/images/logo.png
    - assets/student.json